<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港澳旅遊地圖與清單</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        h1 { padding: 10px 20px; margin: 0; background: #f8f9fa; font-size: 1.5rem; border-bottom: 1px solid #ddd; }
        
        /* 地圖區域 */
        #map { height: 60%; width: 100%; }

        /* 清單區域 */
        #list-container {
            height: 40%;
            overflow-y: auto;
            background: white;
            padding: 0;
            margin: 0;
            list-style: none;
            border-top: 2px solid #007bff;
        }

        .list-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover { background: #f0f7ff; }
        .list-item h3 { margin: 0 0 5px 0; color: #007bff; font-size: 1.1rem; }
        .list-item p { margin: 0; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>📍 我的港澳行程規劃</h1>
    <div id="map"></div>
    <ul id="list-container"></ul>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地圖
        var map = L.map('map').setView([22.28, 113.88], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. 景點資料
        var spots = [
            { name: "太平山頂", lat: 22.2759, lng: 114.1455, info: "看維港夜景的首選" },
            { name: "昂坪360", lat: 22.2541, lng: 113.9051, info: "搭纜車看大嶼山大佛" },
            { name: "大三巴牌坊", lat: 22.1977, lng: 113.5409, info: "澳門必拍的地標建築" },
            { name: "官也街", lat: 22.1533, lng: 113.5573, info: "買手信跟吃水蟹粥的地方" }
        ];

        var listContainer = document.getElementById('list-container');

        // 3. 遍歷資料：同時建立 Marker 和 清單項目
        spots.forEach(function(spot) {
            // --- 建立地圖標記 ---
            // 我們把 marker 實體存入 spot 物件中，方便之後透過清單點擊它
            spot.marker = L.marker([spot.lat, spot.lng])
                .addTo(map)
                .bindPopup(`<b>${spot.name}</b><br>${spot.info}`);

            // --- 建立下方清單項目 ---
            var li = document.createElement('li');
            li.className = 'list-item';
            li.innerHTML = `<h3>${spot.name}</h3><p>${spot.info}</p>`;
            
            // --- 點擊清單項目的動作 ---
            li.onclick = function() {
                // 移動地圖 (座標, 縮放層級)
                map.flyTo([spot.lat, spot.lng], 15);
                
                // 自動打開該標記的彈出視窗
                spot.marker.openPopup();
            };

            listContainer.appendChild(li);
        });
    </script>
</body>
</html>
